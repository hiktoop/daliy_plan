<div class="main">
  <!-- Top bar: title + add button -->
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <span class="page-title">🌱 习惯养成</span>
    <span style="font-size:12px;color:var(--text-3);" id="habits-today-label"></span>
    <button class="btn-save" id="btn-add-habit" onclick="showAddHabit()" style="margin-left:auto;margin-top:0;font-size:12px;padding:6px 14px;">+ 新建习惯</button>
  </div>

  <!-- Add habit form (hidden by default) -->
  <div class="card" id="habit-add-card" style="display:none;">
    <div class="card-title">新建习惯</div>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div style="flex:1;min-width:140px;">
        <div style="font-size:11px;color:var(--text-3);margin-bottom:4px;">名称</div>
        <input class="note-field" id="habit-add-name" placeholder="例如：跑步、阅读、喝水..." style="min-height:36px;padding:6px 10px;">
      </div>
      <div style="min-width:100px;">
        <div style="font-size:11px;color:var(--text-3);margin-bottom:4px;">频率</div>
        <select class="pomo-select" id="habit-add-freq" style="min-width:auto;">
          <option value="daily">每天</option>
          <option value="weekly">每周</option>
        </select>
      </div>
      <div style="min-width:100px;">
        <div style="font-size:11px;color:var(--text-3);margin-bottom:4px;">图标</div>
        <select class="pomo-select" id="habit-add-icon" style="min-width:auto;">
          <option value="🏃">🏃 运动</option>
          <option value="💧">💧 喝水</option>
          <option value="📖">📖 阅读</option>
          <option value="🧘">🧘 冥想</option>
          <option value="💪">💪 健身</option>
          <option value="🎯">🎯 专注</option>
          <option value="✍️">✍️ 写作</option>
          <option value="🌅">🌅 早起</option>
          <option value="🎵">🎵 音乐</option>
          <option value="🍎">🍎 饮食</option>
          <option value="💤">💤 早睡</option>
          <option value="📝">📝 日记</option>
          <option value="🧹">🧹 整理</option>
          <option value="🌿">🌿 冥想</option>
          <option value="💻">💻 编程</option>
        </select>
      </div>
      <div>
        <button class="pomo-btn pomo-start" onclick="createHabit()" style="font-size:12px;padding:6px 16px;">创建</button>
        <button class="pomo-btn pomo-reset" onclick="cancelAddHabit()" style="font-size:12px;padding:6px 12px;">取消</button>
      </div>
    </div>
  </div>

  <!-- Habit cards grid -->
  <div class="habits-grid" id="habits-grid"></div>

  <!-- Overview stats panel -->
  <div class="card" id="habits-stats" style="display:none;margin-top:12px;padding:12px 16px;"></div>

  <!-- Empty state -->
  <div id="habits-empty" class="empty-state" style="display:none;">
    <div class="empty-icon">🌱</div>
    还没有习惯，点击右上角"新建习惯"开始
  </div>

  <!-- Heatmap -->
  <div class="card" style="margin-top:16px;">
    <div class="card-title">打卡热力图（近 12 周）</div>
    <div class="heatmap-wrap" id="habits-heatmap"></div>
  </div>
</div>
