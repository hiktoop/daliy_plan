<div class="main">
  <div class="date-bar">
    <span class="date-big" id="today-date-label"></span>
    <span class="date-sub" id="today-weekday"></span>
    <div class="date-nav">
      <button id="btn-prev-day" onclick="navDay(-1)" title="前一天">&#8249;</button>
      <button id="btn-today" onclick="goToday()" title="回今天" style="width:auto;padding:0 8px;font-size:12px;">今天</button>
      <button id="btn-next-day" onclick="navDay(1)" title="后一天">&#8250;</button>
    </div>
  </div>

  <div class="card" id="card-morning">
    <div class="card-title">
      <span class="badge badge-morning">早间</span>
      今日必做事项
      <span style="margin-left:auto;font-size:11px;color:var(--text-3)" id="morning-hint">最多 10 项</span>
    </div>
    <!-- 今日复习 -->
    <div id="review-section" style="display:none;margin-bottom:12px;">
      <div style="font-size:12px;font-weight:500;color:var(--accent);margin-bottom:6px;">📖 今日复习</div>
      <div id="review-list"></div>
    </div>
    <div id="morning-empty-msg" class="empty-state" style="display:none;padding:24px 0;">
      <div class="empty-icon">📅</div>
      该日期没有记录
    </div>
    <ul class="task-list" id="morning-task-list"></ul>
    <div class="add-task-row" id="add-task-area" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="add-kind-btn active" onclick="addTask('task')" title="添加一个新事项"><span class="add-icon">+</span> 事项</span>
    </div>
    <div id="morning-note-wrap" style="margin-top:14px;">
      <div style="font-size:12px;color:var(--text-3);margin-bottom:6px;">今日备注（可选）</div>
      <textarea class="note-field" id="morning-note" placeholder="写下今天的目标、心情或需要提醒自己的事…" rows="2"></textarea>
    </div>
    <div style="margin-top:10px;">
      <button class="btn-save" id="btn-save-morning" onclick="saveMorning()">保存早间计划</button>
    </div>
  </div>

  <div class="card" id="card-evening">
    <div class="card-title">
      <span class="badge badge-evening">晚间</span>
      完成情况复盘
    </div>
    <div id="evening-no-plan" style="display:none;">
      <div class="empty-state">
        <div class="empty-icon">&#9789;</div>
        今天还没有早间计划，请先填写必做事项
      </div>
    </div>
    <div id="evening-form">
      <ul class="task-list" id="evening-task-list"></ul>
      <div style="margin-top:14px;">
        <div style="font-size:12px;color:var(--text-3);margin-bottom:6px;">今日总结（可选）</div>
        <textarea class="note-field" id="evening-note" placeholder="今天完成得怎么样？有什么收获或遗憾？" rows="2"></textarea>
      </div>
      <div style="margin-top:10px;">
        <button class="btn-save" id="btn-save-evening" onclick="saveEvening()">保存复盘</button>
      </div>
    </div>
    <div id="evening-summary" style="display:none;margin-top:4px;">
      <div class="progress-row" id="summary-metrics"></div>
      <div id="summary-task-chips" style="margin-top:6px;"></div>
    </div>
  </div>
</div>
