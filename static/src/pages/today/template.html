<div class="main">
  <div class="date-bar">
    <span class="date-big" id="today-date-label"></span>
    <span class="date-sub" id="today-weekday"></span>
    <div class="date-nav">
      <button id="btn-prev-day" onclick="navDay(-1)" title="前一天">&#8249;</button>
      <button id="btn-today" onclick="goToday()" title="回今天" style="width:auto;padding:0 10px;font-size:13px;">今天</button>
      <button id="btn-next-day" onclick="navDay(1)" title="后一天">&#8250;</button>
    </div>
  </div>

  <!-- ═══ 早间计划 ═══ -->
  <div class="card card-gradient morning" id="card-morning">
    <div class="card-gradient-header">
      <div class="section-title">☀️ 早间计划</div>
      <div class="section-subtitle">写下今天要做的事，最多 10 项</div>
    </div>
    <div class="card-gradient-body">
      <!-- 今日复习 -->
      <div id="review-section" style="display:none;margin-bottom:16px;">
        <div class="section-header">
          <span class="section-header-icon">📖</span>
          <span class="section-header-label">今日复习</span>
        </div>
        <div id="review-list"></div>
      </div>

      <div id="morning-empty-msg" class="empty-state" style="display:none;">
        <div class="empty-icon">📅</div>
        该日期没有记录
      </div>

      <!-- Task cards container -->
      <div id="morning-task-cards"></div>

      <!-- Add task button -->
      <div class="add-task-row" id="add-task-area">
        <span class="add-kind-btn" onclick="addTask('task')" title="添加一个新事项">
          <span class="add-icon">+</span> 添加事项
        </span>
        <span id="morning-hint" style="font-size:12px;color:var(--text-3);margin-left:auto;"></span>
      </div>

      <!-- Morning note -->
      <div id="morning-note-wrap" style="margin-top:16px;">
        <div class="note-label">✏️ 今日备注（可选）</div>
        <textarea class="note-field" id="morning-note" placeholder="写下今天的目标、心情或需要提醒自己的事…" rows="2"></textarea>
      </div>

      <button class="btn-save btn-save-morning" id="btn-save-morning" onclick="saveMorning()">
        ✓ 保存早间计划
      </button>
    </div>
  </div>

  <!-- ═══ 晚间复盘 ═══ -->
  <div class="card card-gradient evening" id="card-evening">
    <div class="card-gradient-header">
      <div class="section-title">🌙 晚间复盘</div>
      <div class="section-subtitle">回顾今天的完成情况</div>
    </div>
    <div class="card-gradient-body">
      <div id="evening-no-plan" style="display:none;">
        <div class="empty-state">
          <div class="empty-icon">🌙</div>
          今天还没有早间计划，请先填写必做事项
        </div>
      </div>

      <div id="evening-form">
        <div id="evening-task-cards"></div>
        <div style="margin-top:16px;">
          <div class="note-label">📝 今日总结（可选）</div>
          <textarea class="note-field" id="evening-note" placeholder="今天完成得怎么样？有什么收获或遗憾？" rows="2"></textarea>
        </div>
        <button class="btn-save btn-save-evening" id="btn-save-evening" onclick="saveEvening()">
          ✓ 保存复盘
        </button>
      </div>

      <div id="evening-summary" style="display:none;">
        <div class="progress-row" id="summary-metrics"></div>
        <div id="summary-task-chips" style="margin-top:8px;"></div>
      </div>
    </div>
  </div>
</div>
